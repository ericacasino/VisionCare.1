name: corn_disease_detection
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.3
  intl: ^0.20.2
  image_picker: ^1.0.4
  cupertino_icons: ^1.0.2
  auto_size_text: ^3.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  tflite_flutter: ^0.11.0
  image: ^4.1.3
  pdf: ^3.10.4
  open_file: ^3.3.2
  shimmer: ^3.0.0
  vector_graphics: ^1.1.9
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - Assets/
    - Assets/translations/
    - Assets/images/
    - Assets/models/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Assets/icon/Logo.png"
  min_sdk_android: 21
